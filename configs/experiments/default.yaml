  differentialevo: configs/experiments/differentialevo.yaml
  nlme: configs/experiments/nlme_optax.yaml
  hybrid: configs/experiments/hybrid_fixed_hparams.yaml
  node: configs/experiments/neural_ode_remifentanil.yaml
